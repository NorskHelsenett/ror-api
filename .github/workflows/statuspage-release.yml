name: Release Statuspage

on:
  push:
    tags: ["statuspage/v[0-9]+.[0-9]+.[0-9]+", "statuspage/v[0-9]+.[0-9]+.[0-9]+-*"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: norskhelsenett/ror-statuspage
  APP: ror-statuspage
  APP_PATH: statuspage/cmd/statuspage
  MODULE_PATH: statuspage

jobs:
  setenv:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    outputs:
      rorversion: ${{ steps.env.outputs.ROR_VERSION }}
      shortsha: ${{ steps.env.outputs.SHA_SHORT }}
    steps:
      - uses: actions/checkout@v4
      - id: env
        name: Set env
        run: |
          TAG=${GITHUB_REF#refs/tags/statuspage/}
          echo "ROR_VERSION=${TAG}" >> "$GITHUB_OUTPUT"
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

  build-app:
    if: github.ref_type == 'tag'
    needs: setenv
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - name: Start build
        run: |
          echo "Building ${{ env.APP }} ${{ needs.setenv.outputs.rorversion }} (${{ needs.setenv.outputs.shortsha }}) for ${{ matrix.goos }}/${{ matrix.goarch }}"
      - name: Build
        working-directory: ${{ env.MODULE_PATH }}
        run: |
          mkdir -p dist/isbuilt
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -o dist/${{ env.APP }}-${{ matrix.goos }}-${{ matrix.goarch }} -ldflags "-w -extldflags '-static'" ./cmd/statuspage/
          touch dist/isbuilt/${{ env.APP }}-${{ matrix.goos }}-${{ matrix.goarch }}
      - name: Archive binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-build-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.MODULE_PATH }}/dist/${{ env.APP }}-${{ matrix.goos }}-${{ matrix.goarch }}
            ${{ env.MODULE_PATH }}/dist/isbuilt/${{ env.APP }}-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  build-container-image:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - build-app
      - setenv
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download binary build artifacts (linux/amd64)
        uses: actions/download-artifact@v4
        with:
          name: binary-build-linux-amd64
          path: binary-build-linux-amd64
      - name: Download binary build artifacts (linux/arm64)
        uses: actions/download-artifact@v4
        with:
          name: binary-build-linux-arm64
          path: binary-build-linux-arm64

      - name: Check env
        run: |
          echo "Building container ${{ env.APP }} ${{ needs.setenv.outputs.rorversion }} (${{ needs.setenv.outputs.shortsha }})"

      - name: Move artifacts
        run: |
          mkdir -p ${{ env.MODULE_PATH }}/dist
          mv binary-build-linux-amd64/${{ env.APP }}-linux-amd64 ${{ env.MODULE_PATH }}/dist/${{ env.APP }}-linux-amd64
          mv binary-build-linux-arm64/${{ env.APP }}-linux-arm64 ${{ env.MODULE_PATH }}/dist/${{ env.APP }}-linux-arm64
          chmod +x ${{ env.MODULE_PATH }}/dist/${{ env.APP }}-linux-amd64
          chmod +x ${{ env.MODULE_PATH }}/dist/${{ env.APP }}-linux-arm64

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 #v3.5.0
        with:
          cosign-release: "v2.2.4"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Log into registry ${{ env.REGISTRY }}
        if: github.event_name != 'pull_request'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@96383f45573cb7f253c731d3b3ab81c87ef81934 # v5.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ needs.setenv.outputs.rorversion }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ${{ env.MODULE_PATH }}
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Sign the published Docker image
        if: ${{ github.event_name != 'pull_request' }}
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}

  publish-helm:
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - build-container-image
      - setenv
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Check env
        run: |
          echo "Building helm chart for ${{ env.APP }} ${{ needs.setenv.outputs.rorversion }} (${{ needs.setenv.outputs.shortsha }})"
      - name: Install helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.0
      - name: install-yq
        run: |
          wget https://github.com/mikefarah/yq/releases/download/${VERSION}/${BINARY}.tar.gz -O - | tar xz && mv ${BINARY} yq && chmod +x yq
        env:
          VERSION: v4.44.5
          BINARY: yq_linux_amd64
      - name: Build helm chart
        run: |
          export HELM_VERSION=${ROR_VERSION#v*}
          ./yq e -i '.version = strenv(HELM_VERSION),.appVersion = strenv(ROR_VERSION)' ${{ env.MODULE_PATH }}/charts/ror-statuspage/Chart.yaml
          ./yq e -i '.image.tag = strenv(ROR_VERSION),.image.repository = "ghcr.io/norskhelsenett/${{ env.APP }}"' ${{ env.MODULE_PATH }}/charts/ror-statuspage/values.yaml
          helm package ${{ env.MODULE_PATH }}/charts/ror-statuspage
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login -u ${{ github.actor }} ${{ env.REGISTRY }} --password-stdin
          helm push ror-statuspage-${HELM_VERSION}.tgz oci://${{ env.REGISTRY }}/norskhelsenett/helm/
        env:
          ROR_VERSION: ${{ needs.setenv.outputs.rorversion }}
