<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ROR Status</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d37;
    --text: #e1e4ea;
    --muted: #8b8fa3;
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 1.5rem;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 1.5rem; font-weight: 600; }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.85rem;
    color: var(--muted);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .conn-dot.connected { background: var(--green); }
  .namespace-badge {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.25rem 0.75rem;
    font-size: 0.85rem;
    color: var(--blue);
  }
  .summary {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
  }
  .summary-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem 1.5rem;
    min-width: 140px;
    text-align: center;
  }
  .summary-card .count { font-size: 2rem; font-weight: 700; }
  .summary-card .label { font-size: 0.8rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .summary-card.healthy .count { color: var(--green); }
  .summary-card.degraded .count { color: var(--yellow); }
  .summary-card.unhealthy .count { color: var(--red); }
  section { margin-bottom: 2rem; }
  section h2 {
    font-size: 1.1rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .badge {
    background: var(--border);
    border-radius: 10px;
    padding: 0.1rem 0.5rem;
    font-size: 0.75rem;
    font-weight: 400;
    color: var(--muted);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background: var(--card);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  th {
    text-align: left;
    padding: 0.6rem 1rem;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--muted);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 0.6rem 1rem;
    font-size: 0.875rem;
    border-bottom: 1px solid var(--border);
  }
  tr:last-child td { border-bottom: none; }
  .status-dot {
    display: inline-block;
    width: 10px; height: 10px;
    border-radius: 50%;
    margin-right: 0.5rem;
    vertical-align: middle;
  }
  .status-dot.Healthy { background: var(--green); }
  .status-dot.Degraded { background: var(--yellow); }
  .status-dot.Unhealthy { background: var(--red); }
  .status-dot.Unknown { background: var(--muted); }
  .msg { color: var(--muted); font-size: 0.8rem; }
  .empty { text-align: center; padding: 2rem; color: var(--muted); }
  .timestamp { font-size: 0.8rem; color: var(--muted); }

  /* Visual deployment cards */
  .deploy-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }
  .deploy-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    transition: border-color 0.2s;
  }
  .deploy-card:hover { border-color: var(--blue); }
  .deploy-card.Healthy  { border-left: 3px solid var(--green); }
  .deploy-card.Degraded { border-left: 3px solid var(--yellow); }
  .deploy-card.Unhealthy { border-left: 3px solid var(--red); }
  .deploy-card.Unknown  { border-left: 3px solid var(--muted); }
  .deploy-icon {
    flex-shrink: 0;
    width: 48px; height: 48px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .deploy-icon svg { width: 28px; height: 28px; }
  .deploy-icon.Healthy  { background: rgba(34,197,94,0.12); color: var(--green); }
  .deploy-icon.Degraded { background: rgba(234,179,8,0.12); color: var(--yellow); }
  .deploy-icon.Unhealthy { background: rgba(239,68,68,0.12); color: var(--red); }
  .deploy-icon.Unknown  { background: rgba(139,143,163,0.12); color: var(--muted); }
  .deploy-info { flex: 1; min-width: 0; }
  .deploy-name {
    font-weight: 600;
    font-size: 0.95rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .deploy-meta {
    display: flex;
    gap: 0.75rem;
    margin-top: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
    flex-wrap: wrap;
  }
  .deploy-meta span { display: flex; align-items: center; gap: 0.25rem; }
  .deploy-meta svg { width: 14px; height: 14px; }
  .deploy-status-label {
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    margin-top: 0.5rem;
    display: inline-block;
  }
  .deploy-status-label.Healthy  { background: rgba(34,197,94,0.15); color: var(--green); }
  .deploy-status-label.Degraded { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .deploy-status-label.Unhealthy { background: rgba(239,68,68,0.15); color: var(--red); }
  .deploy-status-label.Unknown  { background: rgba(139,143,163,0.15); color: var(--muted); }
  .deploy-msg {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.3rem;
  }
  .replica-bar {
    display: flex;
    gap: 4px;
    margin-top: 0.5rem;
  }
  .replica-pip {
    width: 18px; height: 6px;
    border-radius: 3px;
    background: var(--border);
  }
  .replica-pip.ready { background: var(--green); }
  .replica-pip.ready.Degraded { background: var(--yellow); }
  .replica-pip.ready.Unhealthy { background: var(--red); }
  .deploy-version {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.1rem 0.45rem;
    margin-top: 0.4rem;
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .deploy-version svg { width: 12px; height: 12px; flex-shrink: 0; }
  tr.outdated { background: rgba(234,179,8,0.06); }
  tr.outdated td:first-child { border-left: 3px solid var(--yellow); }
  .version-tag {
    font-family: 'SF Mono', Monaco, Consolas, monospace;
    font-size: 0.78rem;
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
  }
  .version-tag.outdated {
    border-color: var(--yellow);
    color: var(--yellow);
  }

  /* Collapsible sections */
  .section-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.85rem 1rem;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    margin-bottom: 0;
    transition: border-color 0.2s, border-radius 0.2s;
  }
  .section-header:hover { border-color: var(--blue); }
  .section-header.open { border-radius: 8px 8px 0 0; margin-bottom: 0; }
  .section-header .sec-icon {
    flex-shrink: 0;
    width: 36px; height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(59,130,246,0.1);
    color: var(--blue);
  }
  .section-header .sec-icon svg { width: 20px; height: 20px; }
  .section-header .sec-title {
    font-weight: 600;
    font-size: 1rem;
    flex: 1;
  }
  .section-header .sec-summary {
    display: flex;
    gap: 0.75rem;
    align-items: center;
    font-size: 0.8rem;
  }
  .sec-pill {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.15rem 0.55rem;
    border-radius: 10px;
    font-weight: 600;
    font-size: 0.75rem;
  }
  .sec-pill.healthy  { background: rgba(34,197,94,0.12); color: var(--green); }
  .sec-pill.degraded { background: rgba(234,179,8,0.12); color: var(--yellow); }
  .sec-pill.unhealthy { background: rgba(239,68,68,0.12); color: var(--red); }
  .sec-chevron {
    color: var(--muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .sec-chevron svg { width: 18px; height: 18px; }
  .section-header.open .sec-chevron { transform: rotate(180deg); }
  .section-body {
    display: none;
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 8px 8px;
    overflow: hidden;
  }
  .section-body.open { display: block; }
  .section-body table { border: none; border-radius: 0; }
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center;gap:1rem;">
    <h1>ROR Status</h1>
    <span class="namespace-badge" id="ns">—</span>
  </div>
  <div class="conn-status">
    <span class="conn-dot" id="connDot"></span>
    <span id="connText">Connecting...</span>
    <span class="timestamp" id="lastUpdate"></span>
  </div>
</header>

<div class="summary" id="summary"></div>
<div id="content"><p class="empty">Connecting to status stream...</p></div>

<script>
(function() {
  const content = document.getElementById('content');
  const summary = document.getElementById('summary');
  const ns = document.getElementById('ns');
  const connDot = document.getElementById('connDot');
  const connText = document.getElementById('connText');
  const lastUpdate = document.getElementById('lastUpdate');

  function connect() {
    const es = new EventSource('/events');

    es.addEventListener('status', function(e) {
      const snap = JSON.parse(e.data);
      render(snap);
    });

    es.onopen = function() {
      connDot.classList.add('connected');
      connText.textContent = 'Connected';
    };

    es.onerror = function() {
      connDot.classList.remove('connected');
      connText.textContent = 'Reconnecting...';
      es.close();
      setTimeout(connect, 3000);
    };
  }

  function render(snap) {
    ns.textContent = snap.namespace;
    lastUpdate.textContent = 'Updated: ' + new Date(snap.timestamp).toLocaleTimeString();

    // Counts
    const all = [
      ...(snap.deployments||[]),
      ...(snap.statefulSets||[]),
      ...(snap.daemonSets||[]),
      ...(snap.pods||[]),
      ...(snap.services||[]),
      ...(snap.ingresses||[]),
      ...(snap.pvcs||[])
    ];
    const healthy = all.filter(r => r.status === 'Healthy').length;
    const degraded = all.filter(r => r.status === 'Degraded').length;
    const unhealthy = all.filter(r => r.status === 'Unhealthy' || r.status === 'Unknown').length;

    summary.innerHTML = `
      <div class="summary-card healthy"><div class="count">${healthy}</div><div class="label">Healthy</div></div>
      <div class="summary-card degraded"><div class="count">${degraded}</div><div class="label">Degraded</div></div>
      <div class="summary-card unhealthy"><div class="count">${unhealthy}</div><div class="label">Unhealthy</div></div>
      <div class="summary-card"><div class="count">${all.length}</div><div class="label">Total</div></div>
    `;

    let html = '';

    // SVG icons
    const icons = {
      deploy: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><circle cx="6" cy="6" r="1" fill="currentColor"/><circle cx="6" cy="18" r="1" fill="currentColor"/></svg>',
      stateful: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
      daemon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6m-7-9H1m22 0h-4m-1.3-5.7l-2.8 2.8m-5.8 5.8l-2.8 2.8m11.4 0l-2.8-2.8M6.1 6.1L3.3 3.3"/></svg>',
      clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>',
      box: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>',
      tag: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>'
    };

    // Render workloads (Deployments, StatefulSets, DaemonSets) as visual cards
    const workloads = [
      {title: 'Deployments', data: snap.deployments, icon: icons.deploy},
      {title: 'StatefulSets', data: snap.statefulSets, icon: icons.stateful},
      {title: 'DaemonSets', data: snap.daemonSets, icon: icons.daemon}
    ];

    for (const wl of workloads) {
      const items = wl.data || [];
      if (items.length === 0) continue;
      html += `<section><h2>${wl.title} <span class="badge">${items.length}</span></h2>`;
      html += '<div class="deploy-grid">';
      for (const r of items) {
        const parts = r.ready.split('/');
        const readyN = parseInt(parts[0]) || 0;
        const totalN = parseInt(parts[1]) || 0;
        let pips = '';
        for (let i = 0; i < totalN; i++) {
          pips += `<div class="replica-pip${i < readyN ? ' ready' : ''}${i < readyN && r.status !== 'Healthy' ? ' ' + r.status : ''}"></div>`;
        }
        html += `<div class="deploy-card ${r.status}">`;
        html += `<div class="deploy-icon ${r.status}">${wl.icon}</div>`;
        html += `<div class="deploy-info">`;
        html += `<div class="deploy-name" title="${esc(r.name)}">${esc(r.name)}</div>`;
        html += `<div class="deploy-meta">`;
        html += `<span>${icons.box} ${esc(r.ready)}</span>`;
        html += `<span>${icons.clock} ${esc(r.age)}</span>`;
        html += `</div>`;
        if (totalN > 0) html += `<div class="replica-bar">${pips}</div>`;
        if (r.version) html += `<div class="deploy-version">${icons.tag} ${esc(r.version)}</div>`;
        html += `<span class="deploy-status-label ${r.status}">${r.status}</span>`;
        if (r.message) html += `<div class="deploy-msg">${esc(r.message)}</div>`;
        html += `</div></div>`;
      }
      html += '</div></section>';
    }

    // SVG icons for table sections
    const secIcons = {
      Pods: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><circle cx="9" cy="9" r="1" fill="currentColor"/><circle cx="15" cy="9" r="1" fill="currentColor"/><path d="M9 15h6"/></svg>',
      Services: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
      Ingresses: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>',
      PVCs: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>'
    };
    const chevron = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>';

    // Render remaining sections as collapsible tables
    const sections = [
      {title: 'Pods', data: snap.pods, cols: ['Name','Status','Ready','Version','Age','Message']},
      {title: 'Services', data: snap.services, cols: ['Name','Status','Type','Age']},
      {title: 'Ingresses', data: snap.ingresses, cols: ['Name','Status','Hosts','Age']},
      {title: 'PVCs', data: snap.pvcs, cols: ['Name','Status','Phase','Capacity','Age']}
    ];

    for (const sec of sections) {
      const items = sec.data || [];
      if (items.length === 0) continue;

      const hCount = items.filter(r => r.status === 'Healthy').length;
      const dCount = items.filter(r => r.status === 'Degraded').length;
      const uCount = items.filter(r => r.status === 'Unhealthy' || r.status === 'Unknown').length;
      const oCount = items.filter(r => r.outdated).length;
      const secId = sec.title.toLowerCase().replace(/\s/g,'');

      html += `<section>`;
      html += `<div class="section-header" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')" id="hdr-${secId}">`;
      html += `<div class="sec-icon">${secIcons[sec.title]||''}</div>`;
      html += `<span class="sec-title">${sec.title}</span>`;
      html += `<div class="sec-summary">`;
      if (hCount) html += `<span class="sec-pill healthy">${hCount}</span>`;
      if (dCount) html += `<span class="sec-pill degraded">${dCount}</span>`;
      if (uCount) html += `<span class="sec-pill unhealthy">${uCount}</span>`;
      if (oCount) html += `<span class="sec-pill degraded" title="Outdated version">${oCount} old</span>`;
      html += `<span class="badge">${items.length}</span>`;
      html += `</div>`;
      html += `<span class="sec-chevron">${chevron}</span>`;
      html += `</div>`;

      html += `<div class="section-body" id="body-${secId}">`;
      html += '<table><thead><tr>';
      for (const c of sec.cols) html += `<th>${c}</th>`;
      html += '</tr></thead><tbody>';

      for (const r of items) {
        const rowClass = (sec.title === 'Pods' && r.outdated) ? ' class="outdated"' : '';
        html += `<tr${rowClass}>`;
        if (sec.title === 'PVCs') {
          html += `<td>${esc(r.name)}</td>`;
          html += `<td><span class="status-dot ${r.status}"></span>${r.status}</td>`;
          html += `<td>${esc(r.ready)}</td>`;
          html += `<td>${esc(r.message)}</td>`;
          html += `<td>${esc(r.age)}</td>`;
        } else if (sec.title === 'Services') {
          html += `<td>${esc(r.name)}</td>`;
          html += `<td><span class="status-dot ${r.status}"></span>${r.status}</td>`;
          html += `<td>${esc(r.ready)}</td>`;
          html += `<td>${esc(r.age)}</td>`;
        } else if (sec.title === 'Ingresses') {
          html += `<td>${esc(r.name)}</td>`;
          html += `<td><span class="status-dot ${r.status}"></span>${r.status}</td>`;
          html += `<td>${esc(r.ready)}</td>`;
          html += `<td>${esc(r.age)}</td>`;
        } else {
          html += `<td>${esc(r.name)}</td>`;
          html += `<td><span class="status-dot ${r.status}"></span>${r.status}</td>`;
          html += `<td>${esc(r.ready)}</td>`;
          const vClass = r.outdated ? ' outdated' : '';
          html += `<td>${r.version ? '<span class="version-tag'+vClass+'">'+ esc(r.version) +'</span>' : ''}</td>`;
          html += `<td>${esc(r.age)}</td>`;
          let podMsg = r.message || '';
          if (r.outdated) podMsg = (podMsg ? podMsg + ' — ' : '') + 'Outdated version';
          html += `<td class="msg">${esc(podMsg)}</td>`;
        }
        html += '</tr>';
      }
      html += '</tbody></table></div></section>';
    }

    content.innerHTML = html || '<p class="empty">No resources found in namespace.</p>';
  }

  function esc(s) {
    if (!s) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  connect();
})();
</script>
</body>
</html>
