apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ror-statuspage.fullname" . }}:reader
  namespace: {{ .Values.status.namespace }}
  labels:
    {{- include "ror-statuspage.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "ror-statuspage.fullname" . }}:reader
subjects:
  - kind: ServiceAccount
    name: {{ include "ror-statuspage.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
