apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ror-statuspage.fullname" . }}:reader
  namespace: {{ .Values.status.namespace }}
  labels:
    {{- include "ror-statuspage.labels" . | nindent 4 }}
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
